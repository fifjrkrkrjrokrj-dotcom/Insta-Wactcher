services:
  mongo:
    image: mongo:7
    container_name: insta-monitor-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  insta-monitor:
    build: .
    container_name: instagram-ban-monitor
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017
    volumes:
      - ./insta_session.json:/app/insta_session.json

volumes:
  mongo_data:
